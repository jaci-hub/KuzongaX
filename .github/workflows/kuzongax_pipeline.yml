name: KuzongaX

on:
  schedule:
    # Run every day at midnight (UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:  # allows manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kuzongaenv
          pip install -r requirements.txt

      - name: Step 1 — Generate Challenge
        run: python -m kuzongax.challenge_maker.challenge_maker

      - name: Step 2 — Query all LLM APIs
        run: python -m kuzongax.llm_api.requestor

      - name: Step 3 — Evaluate and Grade
        run: python -m kuzongax.envs.kuzongax_main

      - name: Commit and push updated results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          [ -d "./kuzongax/challenges" ] && git add ./kuzongax/challenges
          [ -d "./kuzongax/results" ] && git add ./kuzongax/results
          [ -d "./kuzongax/leaderboards" ] && git add ./kuzongax/leaderboards
          git commit -m "Automated update: challenge, results, and leaderboards for $(date -u +"%Y-%m-%d %H:%M UTC")" || echo "No changes to commit"
          git push
